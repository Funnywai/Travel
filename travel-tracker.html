<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>旅行記賬</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=LXGW+WenKai+Mono+TC:wght@400;700&family=Noto+Serif+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  :root {
    --primary: #1a1a2e;
    --primary-dark: #0f0f1e;
    --primary-light: #e8e4db;
    --accent: #c8842e;
    --accent-glow: #f0c060;
    --bg: #faf7f2;
    --surface: #fffef9;
    --surface-alt: #f5f0e8;
    --text: #1a1a2e;
    --text-muted: #8a8278;
    --border: #e0dbd0;
    --error: #c0392b;
    --success: #3a7d44;
    --shadow: 0 2px 16px rgba(26,26,46,0.06);
    --shadow-lg: 0 6px 32px rgba(26,26,46,0.10);
    --radius: 14px;
    --radius-sm: 10px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg);
    font-family: 'Noto Serif TC', 'LXGW WenKai Mono TC', 'PingFang TC', 'Microsoft JhengHei', serif;
    color: var(--text);
    font-size: 15px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  body {
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(200,132,46,0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(26,26,46,0.03) 0%, transparent 50%);
  }
  body { overflow-x: hidden; }
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 256px 256px;
    pointer-events: none;
    z-index: 9999;
    opacity: 0.35;
  }
  #app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    background: transparent;
    position: relative;
    padding-bottom: 100px;
  }
  button { font-family: 'DM Sans', 'Noto Serif TC', system-ui, sans-serif; cursor: pointer; border: none; background: none; color: inherit; }
  input, select { font-family: inherit; font-size: 15px; }

  /* Header */
  .header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--surface);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(12px);
    background: rgba(255,254,249,0.92);
  }
  .group-name {
    font-size: 18px;
    font-weight: 700;
    padding: 4px 8px;
    border-radius: 6px;
    cursor: pointer;
    transition: background .15s;
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin: -4px -8px;
    letter-spacing: 0.02em;
  }
  .group-name:hover { background: var(--bg); }
  .group-name input {
    border: none; outline: none; background: transparent;
    font: inherit; width: 100%;
  }
  .icon-btn {
    width: 40px; height: 40px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 50%;
    color: var(--text);
    transition: background .15s;
  }
  .icon-btn:hover { background: var(--bg); }
  .icon-btn svg { width: 22px; height: 22px; }

  /* Sections */
  .section { padding: 20px; }
  .section-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin: 0 0 12px;
    font-family: 'DM Sans', system-ui, sans-serif;
  }
  .section-title-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 0 0 12px;
  }
  .section-toggle {
    font-size: 12px;
    color: var(--accent);
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 14px;
    background: #fdf2e0;
  }
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    border: 1px solid var(--border);
  }
  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  .card > *:nth-child(1) { animation: fadeSlideUp .35s ease both; }
  .card > *:nth-child(2) { animation: fadeSlideUp .35s .05s ease both; }
  .card > *:nth-child(3) { animation: fadeSlideUp .35s .10s ease both; }
  .card > *:nth-child(4) { animation: fadeSlideUp .35s .15s ease both; }
  .card > *:nth-child(5) { animation: fadeSlideUp .35s .20s ease both; }
  .card > *:nth-child(6) { animation: fadeSlideUp .35s .25s ease both; }
  .card > *:nth-child(7) { animation: fadeSlideUp .35s .30s ease both; }
  .card > *:nth-child(8) { animation: fadeSlideUp .35s .35s ease both; }
  .card > *:nth-child(9) { animation: fadeSlideUp .35s .40s ease both; }
  .card > *:nth-child(10) { animation: fadeSlideUp .35s .45s ease both; }
  @keyframes viewIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }
  #ledgerView.view-enter, #scheduleView.view-enter, #wishView.view-enter {
    animation: viewIn .3s ease both;
  }

  /* Balance list */
  .balance-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 18px;
  }
  .balance-row + .balance-row { border-top: 1px solid var(--border); }
  .balance-name { font-weight: 600; }
  .balance-right { text-align: right; }
  .balance-amount { font-weight: 700; font-size: 16px; font-family: 'DM Sans', system-ui, sans-serif; }
  .balance-amount .balance-line { font-weight: 700; font-size: 15px; line-height: 1.3; font-family: 'DM Sans', system-ui, sans-serif; }
  .balance-amount .balance-line + .balance-line { margin-top: 2px; }
  .balance-status { font-size: 12px; margin-top: 2px; font-family: 'DM Sans', system-ui, sans-serif; }
  .status-neutral { color: var(--text-muted); }
  .status-owe { color: var(--error); }
  .status-receive { color: var(--success); }

  /* Records */
  .record-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 18px;
    cursor: pointer;
    transition: background .15s;
  }
  .record-row:hover { background: var(--surface-alt); }
  .record-row + .record-row { border-top: 1px solid var(--border); }
  .record-icon {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--primary-light);
    color: var(--primary);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .record-icon svg { width: 20px; height: 20px; }
  .record-info { flex: 1; min-width: 0; }
  .record-title {
    font-weight: 600;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .record-sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 3px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .type-badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 10px;
    background: var(--primary-light);
    color: var(--primary);
    font-size: 11px;
    font-weight: 600;
    font-family: 'DM Sans', system-ui, sans-serif;
  }
  .type-badge.t-prepaid { background: #fdf2e0; color: #b56a00; }
  .type-badge.t-transfer { background: #e8e4f0; color: #4a3f8a; }
  .record-amount {
    font-weight: 700;
    flex-shrink: 0;
    text-align: right;
    font-family: 'DM Sans', system-ui, sans-serif;
    font-size: 15px;
  }
  .record-detail {
    padding: 0 16px 14px 68px;
    font-size: 13px;
    color: var(--text-muted);
    display: none;
  }
  .record-row.expanded + .record-detail { display: block; }

  .empty {
    padding: 40px 16px;
    text-align: center;
    color: var(--text-muted);
    font-size: 14px;
    font-style: italic;
  }

  /* FAB */
  .fab {
    position: fixed;
    bottom: 24px;
    right: max(24px, calc((100vw - 480px) / 2 + 24px));
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--accent);
    color: white;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 24px rgba(200,132,46,0.40), 0 2px 8px rgba(200,132,46,0.25);
    z-index: 20;
    transition: transform .2s cubic-bezier(.34,1.56,.64,1), box-shadow .2s;
  }
  .fab:hover { background: var(--primary-dark); transform: scale(1.08); box-shadow: 0 8px 32px rgba(200,132,46,0.50); }
  .fab:active { transform: scale(0.95); }
  .fab svg { width: 26px; height: 26px; }

  /* Overlay (input page) */
  .overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    display: none;
  }
  .overlay.open { display: block; }
  .sheet {
    position: fixed;
    left: 50%;
    transform: translateX(-50%) translateY(100%);
    bottom: 0;
    width: 100%;
    max-width: 480px;
    height: 100%;
    background: var(--bg);
    transition: transform .3s ease;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  .overlay.open .sheet { transform: translateX(-50%) translateY(0); }

  .sheet-header {
    position: sticky;
    top: 0;
    background: var(--surface);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    z-index: 5;
  }
  .save-btn {
    background: var(--accent);
    color: white;
    padding: 8px 18px;
    border-radius: 20px;
    font-weight: 600;
    font-size: 14px;
    font-family: 'DM Sans', system-ui, sans-serif;
    transition: all .2s;
  }
  .save-btn:hover { background: var(--primary); }
  .save-btn:disabled { background: #c8c0b8; cursor: wait; }

  /* Tabs */
  .tabs {
    flex: 1;
    display: flex;
    background: var(--bg);
    border-radius: 20px;
    padding: 3px;
    gap: 2px;
  }
  .tab {
    flex: 1;
    padding: 7px 0;
    text-align: center;
    border-radius: 18px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    transition: all .2s;
  }
  .tab.active {
    background: var(--surface);
    color: var(--primary);
    font-weight: 600;
    box-shadow: var(--shadow);
  }

  /* Form */
  .form-body { padding: 16px; flex: 1; }
  .form-group { background: var(--surface); border-radius: var(--radius); margin-bottom: 14px; overflow: hidden; }
  .form-row {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    gap: 12px;
    min-height: 52px;
  }
  .form-row + .form-row { border-top: 1px solid var(--border); }
  .form-row.col { flex-direction: column; align-items: stretch; }
  .form-label { font-size: 14px; color: var(--text-muted); width: 70px; flex-shrink: 0; }
  .form-input {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    text-align: right;
    color: var(--text);
  }
  .form-input.left { text-align: left; }
  select.form-input { text-align-last: right; appearance: none; padding-right: 6px; }

  /* Date input — pin value text to the right edge on mobile (WebKit) */
  input.form-input[type="date"] {
    -webkit-appearance: none;
    appearance: none;
    text-align: right;
    min-width: 0;
  }
  input.form-input[type="date"]::-webkit-date-and-time-value {
    text-align: right;
    width: 100%;
  }
  input.form-input[type="date"]::-webkit-calendar-picker-indicator {
    margin-left: 6px;
    opacity: 0.7;
    cursor: pointer;
  }

  /* Time input — pin value text to the right edge on mobile (WebKit) */
  input.form-input[type="time"] {
    -webkit-appearance: none;
    appearance: none;
    text-align: right;
    min-width: 0;
  }
  input.form-input[type="time"]::-webkit-date-and-time-value {
    text-align: right;
    width: 100%;
  }
  input.form-input[type="time"]::-webkit-calendar-picker-indicator {
    margin-left: 6px;
    opacity: 0.7;
    cursor: pointer;
  }

  /* Date row — make the native picker indicator visible on mobile */
  .date-row input[type="date"] {
    min-height: 24px;
  }
  .date-row input[type="date"]::-webkit-calendar-picker-indicator {
    opacity: 1;
    filter: invert(35%) sepia(70%) saturate(700%) hue-rotate(140deg);
    cursor: pointer;
    padding: 4px;
  }
  .date-pick-btn {
    font-size: 18px;
    padding: 2px 4px;
    color: var(--accent);
    flex-shrink: 0;
  }

  /* Category grid */
  /* Chips */
  .chips {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 4px 0;
    flex: 1;
    -webkit-overflow-scrolling: touch;
  }
  .chips::-webkit-scrollbar { display: none; }
  .chip {
    padding: 6px 14px;
    border-radius: 18px;
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    white-space: nowrap;
    transition: all .2s;
    border: 1px solid var(--border);
    font-family: 'DM Sans', 'Noto Serif TC', system-ui, sans-serif;
  }
  .chip.active {
    background: var(--primary);
    color: var(--accent-glow);
    border-color: var(--primary);
    box-shadow: 0 2px 8px rgba(26,26,46,0.2);
  }
  .chip.disabled { opacity: 0.4; pointer-events: none; }

  /* Member-amount list (multi-select with editable amounts) */
  .ma-section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px 8px;
    background: var(--surface);
  }
  .ma-section-header .ma-title { font-size: 14px; font-weight: 600; color: var(--text); }
  .ma-section-header .ma-sub { font-size: 12px; color: var(--text-muted); margin-left: 8px; }
  .ma-actions { display: flex; gap: 12px; }
  .link-btn { color: var(--accent); font-size: 13px; font-weight: 600; padding: 4px; }
  .link-btn.muted { color: var(--text-muted); }
  .ma-list { background: var(--surface); }
  .ma-row {
    display: flex;
    align-items: center;
    padding: 10px 14px;
    gap: 10px;
    min-height: 50px;
  }
  .ma-row + .ma-row { border-top: 1px solid var(--border); }
  .ma-toggle {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    min-width: 0;
  }
  .ma-check {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 13px; color: white;
    flex-shrink: 0;
    transition: all .15s;
  }
  .ma-row.selected .ma-check {
    background: var(--primary);
    border-color: var(--primary);
  }
  .ma-name {
    font-weight: 500;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .ma-row:not(.selected) .ma-name { color: var(--text-muted); }
  .ma-locked-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    display: inline-block;
  }
  .ma-amount {
    width: 96px;
    text-align: right;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    outline: none;
    font-size: 14px;
    background: var(--surface);
    font-family: 'DM Sans', system-ui, sans-serif;
  }
  .ma-amount:focus { border-color: var(--accent); }
  .ma-row.locked .ma-amount { border-color: var(--accent); }
  .ma-cur { font-size: 12px; color: var(--text-muted); width: 32px; }
  .ma-summary {
    display: flex;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--bg);
    font-size: 12px;
    color: var(--text-muted);
  }
  .ma-summary.warn { color: var(--error); }

  /* Date group headers in records */
  .date-group { margin-bottom: 14px; }
  .date-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 8px 4px 6px;
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 700;
    font-family: 'DM Sans', system-ui, sans-serif;
    letter-spacing: 0.04em;
  }
  .date-header .date-total { font-weight: 500; }

  /* Section total bar */
  .total-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 4px 8px;
    font-size: 12px;
    color: var(--text-muted);
  }
  .total-bar strong { color: var(--text); font-weight: 600; }

  /* Edit / delete buttons in record detail */
  .record-actions {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-top: 8px;
  }
  .record-actions button {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 0;
    font-size: 13px;
    line-height: 1.4;
  }
  .record-edit { color: var(--accent); font-weight: 600; }
  .record-delete { color: var(--error); }

  /* Lock dot — interactive */
  .ma-locked-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--primary);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 9px;
    cursor: pointer;
    margin-left: 4px;
    vertical-align: middle;
  }

  /* Inline add-member row */
  .add-inline-row {
    display: flex;
    gap: 8px;
    margin: 10px 0;
  }
  .add-inline-row input {
    flex: 1;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    outline: none;
  }
  .add-inline-row input:focus { border-color: var(--accent); }
  .add-inline-row button {
    padding: 8px 14px;
    border-radius: 8px;
    background: var(--accent);
    color: white;
    font-weight: 600;
  }

  /* Settlement card */
  .settle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    gap: 8px;
  }
  .settle-row + .settle-row { border-top: 1px solid var(--border); }
  .settle-flow {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
    min-width: 0;
  }
  .settle-arrow { color: var(--text-muted); font-size: 13px; }
  .settle-amount { font-weight: 700; color: var(--accent); font-family: 'DM Sans', system-ui, sans-serif; }
  .settle-name { font-weight: 500; }

  /* Quick action chip row above payer/share lists */
  .quick-actions {
    display: flex;
    gap: 8px;
    padding: 8px 16px 4px;
    flex-wrap: wrap;
  }
  .quick-chip {
    padding: 4px 10px;
    border-radius: 12px;
    background: var(--primary-light);
    color: var(--accent);
    font-size: 12px;
    font-weight: 500;
    font-family: 'DM Sans', system-ui, sans-serif;
  }

  /* Modal (setup, settings) */
  .modal {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    display: none;
    align-items: flex-end;
    justify-content: center;
  }
  .modal.open { display: flex; }
  .modal-content {
    background: var(--surface);
    width: 100%;
    max-width: 480px;
    border-radius: 24px 24px 0 0;
    padding: 24px;
    max-height: 85vh;
    overflow-y: auto;
    animation: slideUp .3s cubic-bezier(.4,0,.2,1);
  }
  .modal.centered { align-items: center; }
  .modal.centered .modal-content { border-radius: var(--radius); margin: 16px; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-title { font-size: 18px; font-weight: 700; margin: 0 0 16px; }
  .text-input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 15px;
    outline: none;
    margin-bottom: 10px;
  }
  .text-input:focus { border-color: var(--accent); }
  .btn-primary {
    background: var(--accent);
    color: white;
    padding: 14px 20px;
    border-radius: var(--radius);
    font-weight: 600;
    width: 100%;
    font-size: 15px;
    font-family: 'DM Sans', system-ui, sans-serif;
    transition: all .2s;
  }
  .btn-primary:hover { background: var(--primary); }
  .btn-primary:disabled { background: #c8c0b8; }

<script>
(function(){
  // ---------- Firebase ----------
  const firebaseConfig = {
    databaseURL: "https://travel-2cd12-default-rtdb.asia-southeast1.firebasedatabase.app/"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // ---------- Trip id from URL hash ----------
  function randomId(n=6){ return Math.random().toString(36).slice(2, 2+n); }
  let tripId = location.hash.replace('#','').trim();
  if (!tripId) {
    tripId = randomId(8);
    location.hash = tripId;
  }
  const tripRef = db.ref('trips/' + tripId);

  // ---------- State ----------
  let state = {
    meta: null,        // { name, currency, members: {id: {name}} }
    records: {},       // { id: record }
    schedule: {},      // { id: scheduleItem }
    wishlist: {},      // { id: wishItem }
    currentView: 'ledger', // 'ledger' | 'schedule' | 'wishlist'
    schedSort: 'date',     // 'date' | 'created'
    showWishActions: false,
    showSchedActions: false,
    schedForm: {           // edit form state for schedule items
      editingId: null,
      mode: 'single',       // 'single' | 'range'
      date: '',
      time: '',
      endTime: '',
      location: '',
      endLocation: '',
      mapUrl: '',
      endMapUrl: '',
      note: ''
    },
    wishForm: {            // edit form state for wishlist items
      editingId: null,
      title: '',
      locations: [],
      note: ''
    },
    currentTab: '支出',
    form: {
      amount: '',
      note: '',
      currency: 'JPY',
      // 支出/預付:
      payers: {},        // { memberId: amount }  (selected payers; multi)
      payerLocked: {},   // { memberId: true }    (manually edited)
      shares: {},        // { memberId: amount }  (selected participants; multi)
      shareLocked: {},   // { memberId: true }
      // 轉賬:
      transferFrom: '',
      transferTo: ''
    }
  };

  const CURRENCIES = ['JPY','HKD','TWD','KRW'];

  // ---------- Currency conversion (in-memory only; no storage) ----------
  // displayCurrency: '' = no conversion (use original), else a code like 'HKD'.
  // rates: { base: { code: rate } } — fetched lazily.
  state.displayCurrency = '';
  state.rates = {};       // base -> { code: rate }
  state.rateLoading = false;
  state.rateError = '';

  async function ensureRatesFor(base){
    if (!base) return null;
    if (state.rates[base]) return state.rates[base];
    try {
      const res = await fetch(`https://api.exchangerate.fun/latest?base=${encodeURIComponent(base)}`);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      if (!data || !data.rates) throw new Error('回應格式錯誤');
      state.rates[base] = data.rates;
      return data.rates;
    } catch (err) {
      state.rateError = err.message || String(err);
      return null;
    }
  }

  function convert(amount, from, to){
    if (!to || !from || from === to) return { value: amount, ok: true };
    const table = state.rates[from];
    if (!table) return { value: amount, ok: false };
    const r = table[to];
    if (typeof r !== 'number') return { value: amount, ok: false };
    return { value: amount * r, ok: true };
  }

  // Sum amounts across currencies into the display currency. Returns a string.
  function fmtSum(perCurrency){
    const display = state.displayCurrency;
    const entries = Object.entries(perCurrency);
    if (!display) {
      return entries.length ? entries.map(([c, v]) => `${v.toFixed(1)} ${c}`).join(' · ') : '—';
    }
    let total = 0, allOk = true;
    for (const [c, v] of entries) {
      const { value, ok } = convert(v, c, display);
      if (!ok) allOk = false;
      total += value;
    }
    return `${total.toFixed(1)} ${display}${allOk ? '' : ' *'}`;
  }

  async function loadAllRates(){
    if (!state.displayCurrency) { renderAll(); return; }
    state.rateLoading = true;
    updateRateStatus();
    const bases = new Set();
    Object.values(state.records || {}).forEach(r => { if (r && r.currency) bases.add(r.currency); });
    bases.add(state.displayCurrency);
    state.rateError = '';
    await Promise.all(Array.from(bases).map(b => ensureRatesFor(b)));
    state.rateLoading = false;
    updateRateStatus();
    renderAll();
  }

  // ---------- Balance calc ----------
  // Returns: { [memberId]: { [currency]: amount } } — preserves per-currency precision.
  function computeBalancesByCurrency(){
    const balances = {};
    memberList().forEach(m => balances[m.id] = {});
    const add = (id, cur, amt) => {
      if (!balances[id]) return;
      balances[id][cur] = (balances[id][cur] || 0) + amt;
    };
    Object.values(state.records).forEach(r => {
      if (!r) return;
      const cur = r.currency || 'JPY';
      if (r.type === '支出' || r.type === '預付') {
        if (r.payers && r.shares) {
          Object.entries(r.payers).forEach(([id, amt]) => add(id, cur, Number(amt) || 0));
          Object.entries(r.shares).forEach(([id, amt]) => add(id, cur, -(Number(amt) || 0)));
        } else {
          const parts = (r.participants || []).filter(p => balances.hasOwnProperty(p));
          if (!parts.length || !balances.hasOwnProperty(r.payer)) return;
          const share = (r.amount || 0) / parts.length;
          add(r.payer, cur, r.amount || 0);
          parts.forEach(p => add(p, cur, -share));
        }
      } else if (r.type === '轉賬') {
        const from = r.payer || r.transferFrom;
        const to = r.receiver || r.transferTo;
        add(from, cur, r.amount || 0);
        add(to, cur, -(r.amount || 0));
      }
    });
    return balances;
  }

  // Collapse per-currency balances into a single number using display currency.
  // Returns { [memberId]: number, _allConverted: bool }
  function computeBalances(){
    const byCur = computeBalancesByCurrency();
    const display = state.displayCurrency;
    const out = {};
    let allConverted = true;
    Object.entries(byCur).forEach(([id, perCur]) => {
      let total = 0;
      Object.entries(perCur).forEach(([cur, v]) => {
        if (display && cur !== display) {
          const { value, ok } = convert(v, cur, display);
          if (!ok) allConverted = false;
          total += value;
        } else {
          total += v;
        }
      });
      out[id] = total;
    });
    out._allConverted = allConverted;
    return out;
  }

  // ---------- Render: balances ----------
  function renderBalances(){
    const container = $('#balanceList');
    const members = memberList();
    if (!members.length) {
      container.innerHTML = '<div class="empty">尚未新增成員</div>';
      return;
    }
    const display = state.displayCurrency;
    const byCur = computeBalancesByCurrency();

    // Decide each member's status by looking at the converted total when display is set,
    // otherwise by checking if any per-currency entry is non-zero.
    container.innerHTML = members.map(m => {
      const perCur = byCur[m.id] || {};
      let status, cls, amountHtml;

      if (display) {
        let total = 0, allOk = true;
        Object.entries(perCur).forEach(([cur, v]) => {
          if (cur === display) { total += v; return; }
          const { value, ok } = convert(v, cur, display);
          if (!ok) allOk = false;
          total += value;
        });
        if (Math.abs(total) < 0.05) {
          status = '收支平衡'; cls = 'status-neutral';
          amountHtml = '';
        } else if (total < 0) {
          status = '待支付'; cls = 'status-owe';
          amountHtml = `${total.toFixed(1)} ${display}${allOk ? '' : ' *'}`;
        } else {
          status = '待收款'; cls = 'status-receive';
          amountHtml = `${total.toFixed(1)} ${display}${allOk ? '' : ' *'}`;
        }
      } else {
        // No display currency — show per-currency breakdown (no fake summing).
        const entries = Object.entries(perCur).filter(([, v]) => Math.abs(v) >= 0.05);
        if (!entries.length) {
          status = '收支平衡'; cls = 'status-neutral';
          amountHtml = '';
        } else {
          const allNeg = entries.every(([, v]) => v < 0);
          const allPos = entries.every(([, v]) => v > 0);
          if (allNeg) { status = '待支付'; cls = 'status-owe'; }
          else if (allPos) { status = '待收款'; cls = 'status-receive'; }
          else { status = '部分待支付 / 部分待收款'; cls = 'status-neutral'; }
          amountHtml = entries
            .map(([cur, v]) => `<div class="balance-line ${v < 0 ? 'status-owe' : v > 0 ? 'status-receive' : ''}">${v.toFixed(1)} ${cur}</div>`)
            .join('');
        }
      }

      return `<div class="balance-row">
        <div class="balance-name">${escapeHtml(m.name)}</div>
        <div class="balance-right">
          <div class="balance-amount ${cls}">${amountHtml}</div>
          <div class="balance-status ${cls}">${status}</div>
        </div>
      </div>`;
    }).join('');
  }

  // ---------- Render: per-person expense totals ----------
  function renderPersonExpenses(containerId){
    const container = document.getElementById(containerId || 'popupPersonExpenseList');
    if (!container) return;
    const members = memberList();
    if (!members.length) {
      container.innerHTML = '<div class="empty">尚未新增成員</div>';
      return;
    }

    // Sum each member's share from 支出/預付 records, per currency
    const totals = {};
    members.forEach(m => totals[m.id] = {});

    Object.values(state.records).forEach(r => {
      if (!r || (r.type !== '支出' && r.type !== '預付')) return;
      const cur = r.currency || 'JPY';
      const shares = r.shares || {};
      Object.entries(shares).forEach(([id, amt]) => {
        if (!totals[id]) return;
        totals[id][cur] = (totals[id][cur] || 0) + (Number(amt) || 0);
      });
      // Legacy: without shares, use participants
      if (!Object.keys(shares).length && r.participants) {
        const share = (Number(r.amount) || 0) / r.participants.length;
        r.participants.forEach(id => {
          if (!totals[id]) return;
          totals[id][cur] = (totals[id][cur] || 0) + share;
        });
      }
    });

    const display = state.displayCurrency;
    container.innerHTML = members.map(m => {
      const perCur = totals[m.id] || {};
      let html;
      if (display) {
        let total = 0, allOk = true;
        Object.entries(perCur).forEach(([cur, v]) => {
          if (cur === display) { total += v; return; }
          const { value, ok } = convert(v, cur, display);
          if (!ok) allOk = false;
          total += value;
        });
        html = total > 0 ? `${total.toFixed(1)} ${display}${allOk ? '' : ' *'}` : '';
      } else {
        const entries = Object.entries(perCur).filter(([, v]) => v > 0.005);
        html = entries.length
          ? entries.map(([cur, v]) => `<div class="balance-line">${v.toFixed(1)} ${cur}</div>`).join('')
          : '';
      }
      if (!html) html = '<span style="color:var(--text-muted)">—</span>';

      return `<div class="balance-row">
        <div class="balance-name">${escapeHtml(m.name)}</div>
        <div class="balance-right">
          <div class="balance-amount">${html}</div>
        </div>
      </div>`;
    }).join('');
  }

  // ---------- Render: settlement (debt simplification) ----------
  function simplifyDebts(balances){
    // Greedy min-transactions algorithm.
    const pos = [], neg = [];
    Object.entries(balances).forEach(([id, v]) => {
      if (id === '_allConverted') return;
      const r = round2(v);
      if (r > 0.005) pos.push({ id, amt: r });
      else if (r < -0.005) neg.push({ id, amt: -r });
    });
    pos.sort((a, b) => b.amt - a.amt);
    neg.sort((a, b) => b.amt - a.amt);
    const txs = [];
    let i = 0, j = 0;
    while (i < neg.length && j < pos.length) {
      const pay = Math.min(neg[i].amt, pos[j].amt);
      txs.push({ from: neg[i].id, to: pos[j].id, amount: round2(pay) });
      neg[i].amt = round2(neg[i].amt - pay);
      pos[j].amt = round2(pos[j].amt - pay);
      if (neg[i].amt < 0.005) i++;
      if (pos[j].amt < 0.005) j++;
    }
    return txs;
  }

  function renderSettlement(sectionId, listId, toggleId){
    sectionId = sectionId || 'popupSettleSection';
    listId = listId || 'popupSettleList';
    toggleId = toggleId || 'popupSettleToggle';
    const section = document.getElementById(sectionId);
    const container = document.getElementById(listId);
    if (!section || !container) return;
    if (!memberList().length || !Object.keys(state.records).length) {
      section.style.display = 'none';
      return;
    }

    const display = state.displayCurrency;
    let allTxs = []; // each: { from, to, amount, currency, ok }

    if (display) {
      // Convert and merge into one currency, then simplify.
      const balances = computeBalances();
      const ok = balances._allConverted !== false;
      const txs = simplifyDebts(balances);
      allTxs = txs.map(tx => ({ ...tx, currency: display, ok }));
    } else {
      // Simplify per-currency separately (no fake summing across currencies).
      const byCur = computeBalancesByCurrency();
      const currencies = new Set();
      Object.values(byCur).forEach(perCur => Object.keys(perCur).forEach(c => currencies.add(c)));
      currencies.forEach(cur => {
        const slice = {};
        Object.entries(byCur).forEach(([id, perCur]) => { slice[id] = perCur[cur] || 0; });
        const txs = simplifyDebts(slice);
        txs.forEach(tx => allTxs.push({ ...tx, currency: cur, ok: true }));
      });
    }

    if (!allTxs.length) {
      section.style.display = 'none';
      return;
    }
    section.style.display = '';
    container.innerHTML = allTxs.map(tx => {
      const star = tx.ok ? '' : ' *';
      return `<div class="settle-row">
        <div class="settle-flow">
          <span class="settle-name">${escapeHtml(memberName(tx.from))}</span>
          <span class="settle-arrow">→</span>

    }).join('');
  }

  function renderRecords(){

  function formatDateLabel(iso){
    if (!iso || iso === '未知日期') return '未知日期';
    const [y, m, d] = iso.split('-').map(Number);
    if (!y) return iso;
    const today = new Date(); today.setHours(0,0,0,0);
    const date = new Date(y, m-1, d);
    const diffDays = Math.round((today - date) / 86400000);
    if (diffDays === 0) return `今天 · ${m}月${d}日`;
    if (diffDays === 1) return `昨天 · ${m}月${d}日`;
    if (diffDays === -1) return `明天 · ${m}月${d}日`;
    return `${y}年${m}月${d}日`;
  }

    }[c]));

  function round2(n){ return Math.round(n * 100) / 100; }

  // Redistribute total across unlocked selected members.
  // `map` = current { id: amount } (only selected ids present).
  // `locked` = { id: true } for manually edited ids.
  // `total` = number, the 總計.
  function redistribute(map, locked, total){
    const ids = Object.keys(map);
    if (!ids.length) return;
    const lockedSum = ids.filter(id => locked[id]).reduce((s, id) => s + (Number(map[id]) || 0), 0);
    const unlockedIds = ids.filter(id => !locked[id]);
    const remaining = Math.max(0, total - lockedSum);
    if (!unlockedIds.length) return;
    const share = round2(remaining / unlockedIds.length);
    unlockedIds.forEach((id, i) => {
      // Put rounding remainder on last unlocked entry.
      if (i === unlockedIds.length - 1) {
        map[id] = round2(remaining - share * (unlockedIds.length - 1));
      } else {
        map[id] = share;
      }
    });
  }

  function renderForm(){
    const tab = state.currentTab;
    const members = memberList();
    const total = parseFloat(state.form.amount) || 0;

    // Disable tab switch while editing
    $$('#tabs .tab').forEach(t => {
      t.style.opacity = state.form.editingId ? '0.5' : '';
      t.style.pointerEvents = state.form.editingId ? 'none' : '';
      t.classList.toggle('active', t.dataset.tab === tab);
    });
    $('#saveBtn').textContent = state.form.editingId ? '更新' : '儲存';

    // Re-balance unlocked entries each render based on current total.
    if (tab !== '轉賬') {
      redistribute(state.form.payers, state.form.payerLocked, total);
      redistribute(state.form.shares, state.form.shareLocked, total);
    }

    const currencySelect = `<select class="form-input" id="f-currency">
      ${CURRENCIES.map(c => `<option ${c===state.form.currency?'selected':''}>${c}</option>`).join('')}
    </select>`;

    let html = '';
    html += `<div class="form-group">
      <div class="form-row"><div class="form-label">總計</div>
        <input class="form-input" id="f-amount" type="text" inputmode="decimal" placeholder="輸入總支出" value="${state.form.amount}" />
      </div>
      <div class="form-row"><div class="form-label">備註</div>
        <input class="form-input" id="f-note" placeholder="備註(可留空)" value="${escapeHtml(state.form.note)}" />
      </div>
      <div class="form-row"><div class="form-label">日期</div>
        <input class="form-input" id="f-date" type="date" value="${state.form.date}" />
      </div>
      <div class="form-row"><div class="form-label">貨幣</div>${currencySelect}</div>
    </div>`;

    if (tab === '轉賬') {
      const memberChips = (selected, exclude) => members.map(m => {
        const isSel = selected === m.id;
        const disabled = exclude === m.id ? 'disabled' : '';
        return `<button class="chip ${isSel?'active':''} ${disabled}" data-mid="${m.id}">${escapeHtml(m.name)}</button>`;
      }).join('');
      html += `<div class="form-group">
        <div class="form-row"><div class="form-label">轉賬人</div>
          <div class="chips" id="chipsPayer">${memberChips(state.form.transferFrom, state.form.transferTo)}</div>
        </div>
        <div class="form-row"><div class="form-label">收款人</div>
          <div class="chips" id="chipsReceiver">${memberChips(state.form.transferTo, state.form.transferFrom)}</div>
        </div>
      </div>`;
    } else {
      html += renderMemberAmountGroup({
        title: '付款人',
        members,
        map: state.form.payers,
        locked: state.form.payerLocked,
        total,
        currency: state.form.currency,
        kind: 'payer'
      });
      html += renderMemberAmountGroup({
        title: '參與者',
        members,
        map: state.form.shares,
        locked: state.form.shareLocked,
        total,
        currency: state.form.currency,
        kind: 'share'
      });
    }

    $('#formBody').innerHTML = html;

    // common bindings
    $('#f-amount').addEventListener('input', e => {
      state.form.amount = e.target.value;
      // Re-render to redistribute, but keep input focused.
      const sel = e.target.selectionStart;
      renderForm();
      const el = $('#f-amount');
      if (el) { el.focus(); try { el.setSelectionRange(sel, sel); } catch(_){} }
    });
    $('#f-note').addEventListener('input', e => state.form.note = e.target.value);
    $('#f-date').addEventListener('change', e => state.form.date = e.target.value);
    $('#f-currency').addEventListener('change', e => { state.form.currency = e.target.value; renderForm(); });

    if (tab === '轉賬') {
      $$('#chipsPayer .chip').forEach(ch => ch.addEventListener('click', () => {
        if (ch.classList.contains('disabled')) return;
        state.form.transferFrom = ch.dataset.mid;
        renderForm();
      }));
      $$('#chipsReceiver .chip').forEach(ch => ch.addEventListener('click', () => {
        if (ch.classList.contains('disabled')) return;
        state.form.transferTo = ch.dataset.mid;
        renderForm();
      }));
    } else {
      bindMemberAmountGroup('payer');
      bindMemberAmountGroup('share');
    }
  }

  function renderMemberAmountGroup({title, members, map, locked, total, currency, kind}){
    const ids = Object.keys(map);
    const sum = ids.reduce((s, id) => s + (Number(map[id]) || 0), 0);
    const allSelected = ids.length === members.length;
    const diff = round2(sum - total);

    let summary = '';
    if (ids.length > 0 && total > 0) {
      let txt, cls = '';
      if (Math.abs(diff) < 0.005) {
        txt = `✓ 已分配 ${sum.toFixed(1)} ${currency}`;
      } else if (diff < 0) {
        txt = `還需分配 ${(-diff).toFixed(1)} ${currency}`;
        cls = 'warn';
      } else {
        txt = `超出 ${diff.toFixed(1)} ${currency}`;
        cls = 'warn';
      }
      summary = `<div class="ma-summary ${cls}">${txt}<span></span></div>`;
    }

    const rows = members.map(m => {
      const selected = map.hasOwnProperty(m.id);
      const isLocked = !!locked[m.id];
      const amt = selected ? (Number(map[m.id]) || 0).toFixed(1) : '';
      return `<div class="ma-row ${selected?'selected':''} ${isLocked?'locked':''}" data-kind="${kind}" data-mid="${m.id}">
        <div class="ma-toggle" data-toggle="1">
          <span class="ma-check">${selected ? '✓' : ''}</span>
          <span class="ma-name">${escapeHtml(m.name)}</span>
          ${isLocked ? '<span class="ma-locked-dot" data-unlock="1" title="已手動輸入，點擊解除鎖定">🔒</span>' : ''}
        </div>
        ${selected
          ? `<input class="ma-amount" type="text" inputmode="decimal" value="${amt}" data-amt="1" />
             <span class="ma-cur">${currency}</span>`
          : ''}
      </div>`;
    }).join('');

    return `<div class="form-group">
      <div class="ma-section-header">
        <div><span class="ma-title">${title}</span></div>
        <div class="ma-actions">
          <button class="link-btn" data-action="all" data-kind="${kind}">${allSelected ? '全不選' : '全選'}</button>
          <button class="link-btn muted" data-action="reset" data-kind="${kind}">平均分配</button>
        </div>
      </div>
      <div class="ma-list">${rows}</div>
      ${summary}
    </div>`;
  }

  function bindMemberAmountGroup(kind){
    const mapKey = kind === 'payer' ? 'payers' : 'shares';
    const lockedKey = kind === 'payer' ? 'payerLocked' : 'shareLocked';

    $$(`.ma-row[data-kind="${kind}"]`).forEach(row => {
      const mid = row.dataset.mid;
      const toggle = row.querySelector('[data-toggle]');
      const unlockDot = row.querySelector('[data-unlock]');
      if (unlockDot) {
        unlockDot.addEventListener('click', e => {
          e.stopPropagation();
          delete state.form[lockedKey][mid];
          renderForm();
        });
      }
      toggle.addEventListener('click', e => {
        if (e.target.closest('[data-unlock]')) return;
        const map = state.form[mapKey];
        const locked = state.form[lockedKey];
        if (map.hasOwnProperty(mid)) {
          delete map[mid];
          delete locked[mid];
          renderForm();
        } else {
          map[mid] = 0;
          renderForm();
        }
      });
      const amtInput = row.querySelector('[data-amt]');
      if (amtInput) {
        amtInput.addEventListener('input', e => {
          const v = parseFloat(e.target.value);
          state.form[mapKey][mid] = isNaN(v) ? 0 : v;
          state.form[lockedKey][mid] = true;
        });
        amtInput.addEventListener('focus', e => e.target.select());
        amtInput.addEventListener('blur', () => { renderForm(); });
      }
    });

    $$(`.link-btn[data-kind="${kind}"]`).forEach(btn => {
      btn.addEventListener('click', () => {
        const action = btn.dataset.action;
        const map = state.form[mapKey];
        const locked = state.form[lockedKey];
        if (action === 'all') {
          const all = memberList();
          const allSelected = Object.keys(map).length === all.length;
          if (allSelected) {
            Object.keys(map).forEach(k => delete map[k]);
            Object.keys(locked).forEach(k => delete locked[k]);
          } else {
            all.forEach(m => { if (!map.hasOwnProperty(m.id)) map[m.id] = 0; });
          }
        } else if (action === 'reset') {
          Object.keys(locked).forEach(k => delete locked[k]);
        }
        renderForm();
      });
    });
  }

  function saveRecord(){
    const tab = state.currentTab;
    const amount = parseFloat(state.form.amount);
    if (!(amount > 0)) { showToast('請輸入有效金額'); return; }

    const editingId = state.form.editingId;
    const date = state.form.date || todayStr();

    let base;
    if (tab === '轉賬') {
      if (!state.form.transferFrom) { showToast('請選擇轉賬人'); return; }
      if (!state.form.transferTo) { showToast('請選擇收款人'); return; }
      if (state.form.transferTo === state.form.transferFrom) { showToast('收款人需與轉賬人不同'); return; }
      base = {
        type: tab,
        amount,
        currency: state.form.currency,
        note: state.form.note || '',
        date,
        payer: state.form.transferFrom,
        receiver: state.form.transferTo
      };
    } else {
      const payers = state.form.payers;
      const shares = state.form.shares;
      if (!Object.keys(payers).length) {
        showToast('請選擇至少一位付款人');
        return;
      }
      if (!Object.keys(shares).length) { showToast('請選擇至少一位參與者'); return; }
      const sumPayers = Object.values(payers).reduce((s, v) => s + (Number(v) || 0), 0);
      const sumShares = Object.values(shares).reduce((s, v) => s + (Number(v) || 0), 0);
      if (Math.abs(sumPayers - amount) > 0.01) { showToast(`付款金額合計需等於總計（差 ${(sumPayers - amount).toFixed(1)}）`); return; }
      if (Math.abs(sumShares - amount) > 0.01) { showToast(`參與者金額合計需等於總計（差 ${(sumShares - amount).toFixed(1)}）`); return; }
      const payersOut = {}; Object.entries(payers).forEach(([k, v]) => payersOut[k] = round2(Number(v) || 0));
      const sharesOut = {}; Object.entries(shares).forEach(([k, v]) => sharesOut[k] = round2(Number(v) || 0));
      base = {
        type: tab,
        amount,
        currency: state.form.currency,
        note: state.form.note || '',
        date,
        payers: payersOut,
        shares: sharesOut
      };
    }

    const saveBtn = $('#saveBtn');
    saveBtn.disabled = true;
    saveBtn.textContent = '儲存中...';

    let promise;
    if (editingId) {
      // Preserve original createdAt; clear stale fields by overwriting cleanly
      const existing = state.records[editingId] || {};
      base.createdAt = existing.createdAt || firebase.database.ServerValue.TIMESTAMP;
      base.updatedAt = firebase.database.ServerValue.TIMESTAMP;
      promise = tripRef.child('records/' + editingId).set(base);
    } else {
      base.createdAt = firebase.database.ServerValue.TIMESTAMP;
      promise = tripRef.child('records').push().set(base);
    }

    promise.then(() => {
      closeInput();
      showToast(editingId ? '已更新' : '已儲存');
    }).catch(err => {
      showToast('儲存失敗：' + err.message);
    }).finally(() => {
      saveBtn.disabled = false;
      saveBtn.textContent = '儲存';
    });
  }

  // ---------- Schedule (行程) ----------
  function renderSchedule(){
    const container = $('#scheduleList');
    const entries = Object.entries(state.schedule || {});
    if (!entries.length) {
      container.innerHTML = '<div class="card"><div class="empty">還沒有任何行程，點擊 + 新增一站！</div></div>';
      return;
    }

    if (state.schedSort === 'created') {
    entries.sort((a, b) => {
      if ((a[1].pinned && b[1].pinned) || (!a[1].pinned && !b[1].pinned)) {
        return (b[1].createdAt || 0) - (a[1].createdAt || 0);
      }
      return a[1].pinned ? -1 : 1;
    });
      const rows = entries.map(([id, item]) => schedRowHtml(id, item)).join('');
      container.innerHTML = `<div class="card ${state.showSchedActions ? '' : 'sched-actions-hidden'}">${rows}</div>`;
    } else {
      // Group by date, then sort by time within each day
      const groups = {};
      entries.forEach(([id, item]) => {
        const d = item.date || '未排日期';
        (groups[d] = groups[d] || []).push([id, item]);
      });
      const sortedDates = Object.keys(groups).sort((a, b) => {
        if (a === '未排日期') return 1;
        if (b === '未排日期') return -1;
        return a.localeCompare(b);
      });
      sortedDates.forEach(d => {
        groups[d].sort((a, b) => {
          const ta = a[1].time || '99:99';
          const tb = b[1].time || '99:99';
          return ta.localeCompare(tb);
        });
      });
      container.innerHTML = sortedDates.map(date => {
        const items = groups[date];
        const rows = items.map(([id, item]) => schedRowHtml(id, item)).join('');
        return `<div class="sched-day">
          <div class="sched-day-header">
            <span>${escapeHtml(formatDateLabel(date))}</span>
            <span class="sched-day-count">${items.length} 項</span>
          </div>
          <div class="card ${state.showSchedActions ? '' : 'sched-actions-hidden'}">${rows}</div>
        </div>`;
      }).join('');
    }

    container.onclick = (e) => {
      const editBtn = e.target.closest('[data-sched-edit]');
      if (editBtn) { e.stopPropagation(); openSchedEdit(editBtn.dataset.schedEdit); return; }
      const delBtn = e.target.closest('[data-sched-del]');
      if (delBtn) {
        e.stopPropagation();
        const id = delBtn.dataset.schedDel;
        if (confirm('確定刪除此行程？')) tripRef.child('schedule/' + id).remove();
        return;
      }
      if (e.target.closest('a')) return; // Don't toggle when tapping map link
      const row = e.target.closest('.sched-row');
      if (row) row.classList.toggle('expanded');
    };
  }

  function schedRowHtml(id, item){
    const isRange = !!(item.endLocation || item.mode === 'range');
    const hasEndTime = !!item.endTime;
    const startLoc = item.location || item.title || '未命名';
    const endLoc = isRange ? (item.endLocation || '·') : startLoc;

    const startLocHtml = item.mapUrl
      ? `<a href="${escapeHtml(item.mapUrl)}" target="_blank" rel="noopener">${escapeHtml(startLoc)}</a>`
      : escapeHtml(startLoc);

    const startTime = item.time || '·';
    const startTimeCls = item.time ? '' : ' sched-no-time';

    const isStacked = !isRange && item.time && item.endTime;

    let timelineHtml;
    if (isStacked) {
      timelineHtml = `<div class="sched-timeline sched-timeline-stacked">
        <div class="sched-leg">
          <span class="sched-time">${escapeHtml(item.time)}</span>
        </div>
        <div class="sched-loc-center">${startLocHtml}</div>
        <div class="sched-leg sched-end">
          <span class="sched-time">${escapeHtml(item.endTime)}</span>
        </div>
      </div>`;
    } else {
      const startLegHtml = `<div class="sched-leg">
        <span class="sched-time${startTimeCls}">${escapeHtml(startTime)}</span>
        <span class="sched-loc">${startLocHtml}</span>
      </div>`;

      let endLegHtml = '';
      if (hasEndTime) {
        const endLocHtml = item.endMapUrl
          ? `<a href="${escapeHtml(item.endMapUrl)}" target="_blank" rel="noopener">${escapeHtml(endLoc)}</a>`
          : escapeHtml(endLoc);
        endLegHtml = `<div class="sched-leg sched-end">
          <span class="sched-time">${escapeHtml(item.endTime)}</span>
          <span class="sched-loc">${endLocHtml}</span>
        </div>`;
      }

      timelineHtml = `<div class="sched-timeline">${startLegHtml}${endLegHtml}</div>`;
    }

    const noteHtml = item.note ? `<div class="sched-note">${escapeHtml(item.note)}</div>` : '';
    return `<div class="sched-row" data-id="${id}">
      ${timelineHtml}
      ${noteHtml}
      <div class="sched-actions">
        <button class="edit" data-sched-edit="${id}">✎ 編輯</button>
        <button class="delete" data-sched-del="${id}">🗑 刪除</button>
      </div>
    </div>`;
  }

  function defaultSchedForm(){
    return {
      editingId: null,
      mode: 'single',
      date: todayStr(),
      time: '',
      endTime: '',
      location: '',
      endLocation: '',
      mapUrl: '',
      endMapUrl: '',
      note: ''
    };

    $('#schedOverlay').classList.add('open');

    };

    $('#schedFormBody').innerHTML = `

      </div>
      <div class="form-group">
        <div class="form-row date-row"><div class="form-label">日期</div>

  function saveSchedule(){
    const f = state.schedForm;
    const location = (f.location || '').trim();
    const endLocation = (f.endLocation || '').trim();
    if (!location) { showToast('請輸入地點'); return; }
    if (f.mode === 'range' && !endLocation) { showToast('請輸入終點'); return; }
    const data = {
      mode: f.mode || 'single',
      location,
      date: f.date || '',
      time: f.time || '',
      endTime: (f.endTime || '').trim(),
      mapUrl: (f.mapUrl || '').trim(),
      endMapUrl: (f.endMapUrl || '').trim(),
      note: (f.note || '').trim()
    };
    if (f.mode === 'range') data.endLocation = endLocation;

    const btn = $('#schedSaveBtn');
    btn.disabled = true;
    btn.textContent = '儲存中...';

    let promise;
    if (f.editingId) {
      const existing = state.schedule[f.editingId] || {};
      data.createdAt = existing.createdAt || firebase.database.ServerValue.TIMESTAMP;
      data.updatedAt = firebase.database.ServerValue.TIMESTAMP;
      promise = tripRef.child('schedule/' + f.editingId).set(data);
    } else {
      data.createdAt = firebase.database.ServerValue.TIMESTAMP;
      promise = tripRef.child('schedule').push().set(data);
    }
    promise.then(() => {
      closeSchedOverlay();
      showToast(f.editingId ? '已更新' : '已新增');
    }).catch(err => showToast('儲存失敗：' + err.message))
      .finally(() => { btn.disabled = false; btn.textContent = '儲存'; });
  }

  // ---------- Wishlist (Marked清單) ----------
  function normalizeWishItem(item){
    const title = item && item.title ? String(item.title) : '';
    const note = item && item.note ? String(item.note) : '';
    const hasLocationsField = !!(item && Object.prototype.hasOwnProperty.call(item, 'locations'));
    let locations = [];
    if (hasLocationsField && Array.isArray(item.locations)) {
      locations = item.locations.map(loc => ({
        name: loc && loc.name ? String(loc.name) : '',
        mapUrl: loc && loc.mapUrl ? String(loc.mapUrl) : '',
        note: loc && loc.note ? String(loc.note) : '',
        hours: loc && loc.hours ? String(loc.hours) : ''
      })).filter(loc => loc.name || loc.mapUrl);
    }
    if (!hasLocationsField && !locations.length) {
      const legacyUrl = item && item.mapUrl ? String(item.mapUrl) : '';
      if (legacyUrl) locations = [{ name: title || '未命名地點', mapUrl: legacyUrl }];
    }
    return { title, note, locations };
  }

  function renderWishList(){
    const container = $('#wishList');
    const entries = Object.entries(state.wishlist || {});
    if (!entries.length) {
      container.innerHTML = '<div class="card"><div class="empty">還沒有Marked種類，點擊新增加入第一個！</div></div>';
      return;
    }
    entries.sort((a, b) => {
      if ((a[1].pinned && b[1].pinned) || (!a[1].pinned && !b[1].pinned)) {
        return (b[1].createdAt || 0) - (a[1].createdAt || 0);
      }
      return a[1].pinned ? -1 : 1;
    });
    const rows = entries.map(([id, item]) => wishRowHtml(id, item)).join('');
    container.innerHTML = `<div class="card ${state.showWishActions ? '' : 'wish-actions-hidden'}">${rows}</div>`;

    container.onclick = (e) => {
      const editBtn = e.target.closest('[data-wish-edit]');
      if (editBtn) { e.stopPropagation(); openWishEdit(editBtn.dataset.wishEdit); return; }
      const delBtn = e.target.closest('[data-wish-del]');
      if (delBtn) {
        e.stopPropagation();
        const id = delBtn.dataset.wishDel;
        if (confirm('確定刪除此Marked？')) tripRef.child('wishlist/' + id).remove();
        return;
      }
      const pinBtn = e.target.closest('[data-wish-pin]');
      if (pinBtn) {
        e.stopPropagation();
        const id = pinBtn.dataset.wishPin;
        const item = state.wishlist[id];
        if (item) tripRef.child('wishlist/' + id + '/pinned').set(!item.pinned);
        return;
      }
      if (e.target.closest('a')) return; // Don't toggle when tapping map link
      const row = e.target.closest('.wish-row');
      if (row) row.classList.toggle('expanded');
    };
  }

  function wishRowHtml(id, item){
    const normalized = normalizeWishItem(item);
    const title = normalized.title || '未命名種類';
    const locations = normalized.locations || [];
    const locCount = locations.length;
    const locSummary = locCount ? `${locCount} 個地點` : '';
    const locHtml = locCount
      ? locations.map(loc => {
          const name = loc.name || '未命名地點';
          const nameHtml = escapeHtml(name);
          const linkHtml = loc.mapUrl
            ? `<a href="${escapeHtml(loc.mapUrl)}" target="_blank" rel="noopener">${nameHtml}</a>`
            : nameHtml;
          const locNoteHtml = loc.note ? `<span class="wish-loc-note">${escapeHtml(loc.note)}</span>` : '';
          const hoursHtml = loc.hours ? `<span class="wish-loc-hours">${escapeHtml(loc.hours)}</span>` : '';
          return `<div class="wish-loc-row-display"><div class="wish-loc">${linkHtml}${locNoteHtml}</div>${hoursHtml}</div>`;
        }).join('')
      : '';
    const noteHtml = normalized.note ? `<div class="wish-note">${escapeHtml(normalized.note)}</div>` : '';
    return `<div class="wish-row${item.pinned ? ' pinned' : ''}" data-id="${id}">
      <div class="wish-info">
        <div class="wish-title">${escapeHtml(title)}${locSummary ? `<span class=\"wish-count\">${locSummary}</span>` : ''}</div>
        ${locHtml ? `<div class=\"wish-locs\">${locHtml}</div>` : ''}
        ${noteHtml}
      </div>
      <div class="wish-actions">
        <button class="pin" data-wish-pin="${id}">${item.pinned ? '📌 已置頂' : '📌 置頂'}</button>
        <button class="edit" data-wish-edit="${id}">✎ 編輯</button>
        <button class="delete" data-wish-del="${id}">🗑 刪除</button>
      </div>
    </div>`;
  }

  function defaultWishForm(){
    return {
      editingId: null,
      title: '',
      locations: [],
      note: ''
    };
  }

  function openWishNew(){
    state.wishForm = defaultWishForm();
    $('#wishTitle').textContent = '新增Marked';
    renderWishForm();
    $('#wishOverlay').classList.add('open');
  }

  function openWishEdit(id){
    const item = state.wishlist[id];
    if (!item) return;
    const normalized = normalizeWishItem(item);
    state.wishForm = {
      editingId: id,
      title: normalized.title || '',
      locations: normalized.locations,
      note: normalized.note || ''
    };
    $('#wishTitle').textContent = '編輯Marked';
    renderWishForm();
    $('#wishOverlay').classList.add('open');
  }

  function closeWishOverlay(){ $('#wishOverlay').classList.remove('open'); }

  function renderWishForm(){
    const f = state.wishForm;
    const locations = Array.isArray(f.locations) ? f.locations : [];
    $('#wishFormBody').innerHTML = `
      <div class="form-group">
        <div class="form-row"><div class="form-label">種類</div>
          <input class="form-input" id="wf-title" placeholder="例如：咖啡、甜點、景點" value="${escapeHtml(f.title)}" />
        </div>
      </div>
      <div class="form-group">
        <div class="form-row col">
          <div class="form-label" style="width:auto;align-self:flex-start;margin-bottom:6px">地點（可留空）</div>
          <div class="wish-form-list" id="wishLocations">
            ${locations.map((loc, i) => `
              <div class="wish-loc-row">
                <div class="wish-loc-row-split">
                  <input class="wish-input" data-loc-name="${i}" placeholder="地點名稱" value="${escapeHtml(loc.name || '')}" style="flex:1" />
                  <input class="wish-input" data-loc-hours="${i}" placeholder="營業時間（可留空）" value="${escapeHtml(loc.hours || '')}" style="max-width:160px" />
                </div>
                <input class="wish-input" data-loc-map="${i}" placeholder="地圖連結（可留空）" value="${escapeHtml(loc.mapUrl || '')}" />
                <input class="wish-input" data-loc-note="${i}" placeholder="備註（可留空）" value="${escapeHtml(loc.note || '')}" />
                <button class="wish-remove" type="button" data-loc-remove="${i}">移除</button>
              </div>
            `).join('')}
          </div>
          <button class="wish-add" type="button" id="wishAddLocation">+ 新增地點</button>
        </div>
      </div>
    `;
    $('#wf-title').addEventListener('input', e => state.wishForm.title = e.target.value);
    $$('#wishLocations [data-loc-name]').forEach(inp => {
      const idx = Number(inp.dataset.locName);
      inp.addEventListener('input', e => { state.wishForm.locations[idx].name = e.target.value; });
    });
    $$('#wishLocations [data-loc-map]').forEach(inp => {
      const idx = Number(inp.dataset.locMap);
      inp.addEventListener('input', e => { state.wishForm.locations[idx].mapUrl = e.target.value; });
    });
    $$('#wishLocations [data-loc-note]').forEach(inp => {
      const idx = Number(inp.dataset.locNote);
      inp.addEventListener('input', e => { state.wishForm.locations[idx].note = e.target.value; });
    });
    $$('#wishLocations [data-loc-hours]').forEach(inp => {
      const idx = Number(inp.dataset.locHours);
      inp.addEventListener('input', e => { state.wishForm.locations[idx].hours = e.target.value; });
    });
    $$('#wishLocations [data-loc-remove]').forEach(btn => {
      const idx = Number(btn.dataset.locRemove);
      btn.addEventListener('click', () => {
        state.wishForm.locations.splice(idx, 1);
        renderWishForm();
      });
    });
    $('#wishAddLocation').addEventListener('click', () => {
      state.wishForm.locations.push({ name: '', mapUrl: '', note: '', hours: '' });
      renderWishForm();
    });
  }

  function saveWish(){
    const f = state.wishForm;
    const title = (f.title || '').trim();
    if (!title) { showToast('請輸入種類'); return; }
    const rawLocations = (f.locations || []).map(loc => ({
      name: (loc && loc.name ? String(loc.name) : '').trim(),
      mapUrl: (loc && loc.mapUrl ? String(loc.mapUrl) : '').trim(),
      note: (loc && loc.note ? String(loc.note) : '').trim(),
      hours: (loc && loc.hours ? String(loc.hours) : '').trim()
    }));
    if (rawLocations.some(loc => loc.mapUrl && !loc.name)) {
      showToast('請填寫地點名稱');
      return;
    }
    const locations = rawLocations.filter(loc => loc.name);
    const data = {
      title,
      locations,
      note: (f.note || '').trim()
    };

    const btn = $('#wishSaveBtn');
    btn.disabled = true;
    btn.textContent = '儲存中...';

    let promise;
    if (f.editingId) {
      const existing = state.wishlist[f.editingId] || {};
      data.createdAt = existing.createdAt || firebase.database.ServerValue.TIMESTAMP;
      data.updatedAt = firebase.database.ServerValue.TIMESTAMP;
      promise = tripRef.child('wishlist/' + f.editingId).set(data);
    } else {
      data.createdAt = firebase.database.ServerValue.TIMESTAMP;
      promise = tripRef.child('wishlist').push().set(data);
    }

    promise.then(() => {
      closeWishOverlay();
      showToast(f.editingId ? '已更新' : '已新增');
    }).catch(err => showToast('儲存失敗：' + err.message))
      .finally(() => { btn.disabled = false; btn.textContent = '儲存'; });
  }

  // ---------- View switching ----------
  function setView(v){
    state.currentView = v;
    $$('.view-tab').forEach(t => t.classList.toggle('active', t.dataset.view === v));
    const views = { ledger: '#ledgerView', schedule: '#scheduleView', wishlist: '#wishView' };
    Object.entries(views).forEach(([key, sel]) => {
      const el = $(sel);
      if (key === v) {
        el.style.display = '';
        el.classList.remove('view-enter');
        void el.offsetWidth;
        el.classList.add('view-enter');
      } else {
        el.style.display = 'none';
        el.classList.remove('view-enter');
      }
    });
  }
  $$('.view-tab').forEach(t => t.addEventListener('click', () => setView(t.dataset.view)));

  // Summary popup buttons
  function openSummaryPopup(mode){
    const personDiv = $('#summaryPersonExpense');
    const settleDiv = $('#summarySettle');
    if (mode === 'person') {
      personDiv.style.display = '';
      settleDiv.style.display = 'none';
      $('#summaryTitle').textContent = '每人支出總計';
      renderPersonExpenses('popupPersonExpenseList');
    } else {
      personDiv.style.display = 'none';
      settleDiv.style.display = '';
      $('#summaryTitle').textContent = '結算建議';
      renderSettlement();
    }
    $('#summaryOverlay').classList.add('open');
  }
  function closeSummaryOverlay(){ $('#summaryOverlay').classList.remove('open'); }
  $('#personExpenseBtn').addEventListener('click', () => openSummaryPopup('person'));
  $('#settleBtn').addEventListener('click', () => openSummaryPopup('settle'));
  $('#closeSummary').addEventListener('click', closeSummaryOverlay);
  $('#summaryOverlay').addEventListener('click', e => {
    if (e.target.id === 'summaryOverlay') closeSummaryOverlay();
  });

  $('#schedSort').addEventListener('click', () => {
    state.schedSort = state.schedSort === 'date' ? 'created' : 'date';
    $('#schedSort').textContent = state.schedSort === 'date' ? '時間排序' : '新增順序';
    renderSchedule();
  });

  $('#schedToggleActions').addEventListener('click', () => {
    state.showSchedActions = !state.showSchedActions;
    $('#schedToggleActions').classList.toggle('off', !state.showSchedActions);
    renderSchedule();
  });

  $('#closeSched').addEventListener('click', closeSchedOverlay);
  $('#schedSaveBtn').addEventListener('click', saveSchedule);
  $('#schedOverlay').addEventListener('click', e => {
    if (e.target.id === 'schedOverlay') closeSchedOverlay();
  });

  $('#closeWish').addEventListener('click', closeWishOverlay);
  $('#wishSaveBtn').addEventListener('click', saveWish);
  $('#wishToggleActions').addEventListener('click', () => {
    state.showWishActions = !state.showWishActions;
    $('#wishToggleActions').classList.toggle('off', !state.showWishActions);
    renderWishList();
  });
  $('#wishOverlay').addEventListener('click', e => {
    if (e.target.id === 'wishOverlay') closeWishOverlay();
  });

  // ---------- Tabs ----------
  $$('#tabs .tab').forEach(t => t.addEventListener('click', () => {
    state.currentTab = t.dataset.tab;
    $$('#tabs .tab').forEach(x => x.classList.toggle('active', x === t));
    // Reset selection-related fields but preserve amount/note/currency for convenience
    const f = state.form;
    f.payers = {};
    f.payerLocked = {};
    f.shares = {};
    f.shareLocked = {};
    f.transferFrom = '';
    f.transferTo = '';
    if (state.currentTab !== '轉賬') {
      memberList().forEach(m => f.shares[m.id] = 0);
    }
    renderForm();
  }));

  $('#fab').addEventListener('click', () => {
    if (!state.meta) { showToast('請先建立旅程'); return; }
    if (state.currentView === 'schedule') {
      openSchedNew();
    } else if (state.currentView === 'wishlist') {
      openWishNew();
    } else {
      if (!memberList().length) { showToast('請先設定成員'); return; }
      openInput();
    }
  });
  $('#closeInput').addEventListener('click', closeInput);
  $('#saveBtn').addEventListener('click', saveRecord);

  // ---------- Settings ----------
  function renderSettings(){
    const list = memberList();
    const container = $('#settingsMembers');
    container.innerHTML = list.map(m => `<div class="member-row">
      <input data-mid="${m.id}" value="${escapeHtml(m.name)}" />
      <button class="remove-btn" data-rm="${m.id}">刪除</button>
    </div>`).join('') || '<div class="empty">尚未新增成員</div>';

    $$('#settingsMembers input').forEach(inp => {
      inp.addEventListener('blur', () => {
        const id = inp.dataset.mid;
        const v = inp.value.trim();
        if (!v) { inp.value = memberName(id); return; }
        tripRef.child('meta/members/' + id + '/name').set(v);
      });
    });
    $$('#settingsMembers [data-rm]').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.dataset.rm;
        if (confirm('確定刪除此成員？相關記錄不會被刪除。')) {
          tripRef.child('meta/members/' + id).remove();
        }
      });
    });
    $('#shareUrl').textContent = location.href;

    // Display-currency dropdown
    const sel = $('#displayCurrency');
    sel.innerHTML = '<option value="">原始貨幣（不轉換）</option>' +
      CURRENCIES.map(c => `<option value="${c}" ${state.displayCurrency===c?'selected':''}>${c}</option>`).join('');
    sel.value = state.displayCurrency;
    updateRateStatus();
  }

  // Bound once
  $('#displayCurrency').addEventListener('change', e => {
    state.displayCurrency = e.target.value || '';
    updateRateStatus();
    loadAllRates();
  });

  $('#settingsBtn').addEventListener('click', () => {
    renderSettings();
    $('#settingsModal').classList.add('open');
  });
  $('#settingsClose').addEventListener('click', () => $('#settingsModal').classList.remove('open'));
  $('#settingsAddMember').addEventListener('click', () => {
    const inp = $('#newMemberName');
    const name = (inp.value || '').trim();
    if (!name) { inp.focus(); return; }
    const id = randomId(6);
    tripRef.child('meta/members/' + id).set({ name }).then(() => {
      inp.value = '';
      inp.focus();
    });
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.activeElement && document.activeElement.id === 'newMemberName') {
      $('#settingsAddMember').click();
    }
  });
  $('#copyUrl').addEventListener('click', () => {
    const url = location.href;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(url).then(() => showToast('已複製連結'));
    } else {
      const ta = document.createElement('textarea');
      ta.value = url; document.body.appendChild(ta);
      ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
      showToast('已複製連結');
    }
  });

  // ---------- Setup flow ----------
  let setupMembers = ['', ''];
  function renderSetup(){
    $('#setupMembers').innerHTML = setupMembers.map((n, i) => `<div class="member-row">
      <input data-idx="${i}" value="${escapeHtml(n)}" placeholder="成員 ${i+1}" />
      ${setupMembers.length > 2 ? `<button class="remove-btn" data-rmi="${i}">刪除</button>` : ''}
    </div>`).join('');
    $$('#setupMembers input').forEach(inp => {
      inp.addEventListener('input', () => { setupMembers[+inp.dataset.idx] = inp.value; });
    });
    $$('#setupMembers [data-rmi]').forEach(btn => {
      btn.addEventListener('click', () => {
        setupMembers.splice(+btn.dataset.rmi, 1);
        renderSetup();
      });
    });
  }
  $('#setupAddMember').addEventListener('click', () => {
    setupMembers.push('');
    renderSetup();
  });
  $('#setupConfirm').addEventListener('click', () => {
    const btn = $('#setupConfirm');
    if (btn.disabled) return;
    const name = $('#setupName').value.trim();
    const names = setupMembers.map(s => s.trim()).filter(Boolean);
    if (!name) { showToast('請輸入旅程名稱'); return; }
    if (names.length < 2) { showToast('請至少新增 2 位成員'); return; }
    btn.disabled = true;
    btn.textContent = '建立中...';
    const members = {};
    names.forEach(n => { members[randomId(6)] = { name: n }; });
    tripRef.child('meta').set({
      name: name,
      currency: 'JPY',
      members: members
    }).then(() => {
      $('#setupModal').classList.remove('open');
    }).catch(err => {
      showToast('建立失敗：' + err.message);
    }).finally(() => {
      btn.disabled = false;
      btn.textContent = '建立';
    });
  });

  // ---------- Firebase listeners ----------
  let metaLoaded = false, recordsLoaded = false;
  function maybeShowSetup(){
    if (metaLoaded && !state.meta) {
      renderSetup();
      $('#setupModal').classList.add('open');
    }
  }

  tripRef.child('meta').on('value', snap => {
    state.meta = snap.val();
    metaLoaded = true;
    if (state.meta) {
      $('#setupModal').classList.remove('open');
      renderGroupName();
      renderBalances();
      renderPersonExpenses();
      renderRecords();
      renderSettlement();
      renderSchedule();
      if ($('#settingsModal').classList.contains('open')) renderSettings();
    } else {
      maybeShowSetup();
    }
  });

  tripRef.child('records').on('value', snap => {
    state.records = snap.val() || {};
    recordsLoaded = true;
    if (state.meta) {
      renderBalances();
      renderPersonExpenses();
      renderRecords();
      renderSettlement();
      // Ensure rates exist for any new currency introduced by records
      if (state.displayCurrency) loadAllRates();
    }
  });

  tripRef.child('schedule').on('value', snap => {
    state.schedule = snap.val() || {};
    if (state.meta) renderSchedule();
  });

  tripRef.child('wishlist').on('value', snap => {
    state.wishlist = snap.val() || {};
    if (state.meta) renderWishList();
  });

  // Initial icons
  renderIcons();

  // Close modal/overlay on backdrop click
  $('#inputOverlay').addEventListener('click', e => {
    if (e.target.id === 'inputOverlay') closeInput();
  });
  $('#settingsModal').addEventListener('click', e => {
    if (e.target.id === 'settingsModal') $('#settingsModal').classList.remove('open');
  });

  // Update URL hash if changed externally
  window.addEventListener('hashchange', () => location.reload());
})();
</script>
</body>
</html>
